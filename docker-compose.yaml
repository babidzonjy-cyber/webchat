services:
    webchat-postgres:
        image: postgres:18.1-bookworm
        container_name: webchat-env-postgres
        ports:
            - 5432:5432
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - POSTGRES_DB=${POSTGRES_DB}
        volumes:
            - ./out/pgdata:/var/lib/postgresql
        restart: always
    webchat-postgres-migrate:
        image: migrate/migrate:v4.19.1
        volumes:
            - ./internal/migrations:/migrations
